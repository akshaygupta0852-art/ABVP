<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABVP : online membership portal</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="resources/download.png" type="image/png" />
  </head>
  <body>
    <nav>
      <div class="logo">
        <img src="resources/download.png" alt="ABVP Logo" />
        <h3>ABVP</h3>
      </div>
      <ul class="nav-links">
        <li id="addMember">Be a member</li>
        <li id="adminPanel">Admin panel</li>
      </ul>
    </nav>

    <!-- Image container -->

    <div id="imgContainer">
      <img loading="lazy" class="images" src="./resources/IMG-20260702-WA0000.jpg" />
    </div>

    <!-- About section -->

    <section id="about"></section>

    <!-- Be a member section -->

    <dialog id="memberDialog">
      <button id="closeDialog" aria-label="Close">&times;</button>
      <form method="dialog" id="memberForm">
        <h2 style="text-align: center">Be a part of us</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required autocomplete="on" />

        <label for="mobileNo">Mobile:</label>
        <input
          type="number"
          id="mobileNo"
          name="mobileNo"
          required
          autocomplete="on"
        />

        <label for="address">Address:</label>
        <input
          type="text"
          id="address"
          name="address"
          required
          autocomplete="on"
        />

        <label for="schoolCollege">School/College:</label>
        <select name="schoolCollege" id="schoolCollege" required>
          <option value="" disabled selected>Select your school/college</option>
        </select>

        <label for="pincode">Pincode :</label>
        <input
          type="number"
          name="pincode"
          id="pincode"
          required
          autocomplete="on"
        />

        <button id="memberSubmit" type="submit">Submit</button>
      </form>
    </dialog>

    <!-- Admin panel section -->

    <dialog id="adminLoginDialog">
      <button id="closeAdminDialog" aria-label="Close">&times;</button>
      <form method="dialog" id="adminLoginForm">
        <h2 style="text-align: center">Admin Panel</h2>
        <label for="adminMobile">Mobile:</label>
        <input
          type="number"
          id="adminMobile"
          class="adminInput"
          name="adminMobile"
          required
          autocomplete="on"
        />
        <label for="adminPassword">Password:</label>
        <input
          type="password"
          id="adminPassword"
          class="adminInput"
          name="adminPassword"
          required
          autocomplete="on"
        />

        <div>
          <input type="checkbox" id="showPassword" />
          <label for="showPassword">Show Password</label>
        </div>

        <button id="adminSubmit" type="submit">Login</button>
      </form>
    </dialog>

    <!-- Admin panel dialog -->

    <dialog id="adminPanelDialog">
      <button id="closeAdminPanelDialog" aria-label="Close">&times;</button>
      <h2>Member List</h2>
      <table border="2" id="studentData">
        <tr>
          <th class="serialNo">S. no.</th>
          <th class="tableName">Name</th>
          <th class="tableMobile">Mobile No.</th>
          <th class="tableSchool">School/college</th>
          <th class="tableAddress">Address</th>
        </tr>
      </table>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
